limit_req_zone $binary_remote_addr zone=api_general:10m rate=20r/s;
limit_conn_zone $binary_remote_addr zone=api_conn:10m;

# Stronger rate limits for auth-sensitive endpoints.
limit_req_zone $binary_remote_addr zone=auth_login:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=auth_otp_send:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=auth_otp_verify:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=admin_auth_login:10m rate=6r/m;
limit_req_zone $binary_remote_addr zone=admin_api:10m rate=15r/s;

server {
    listen 80;
    server_name _;
    limit_req_status 429;
    limit_conn_status 429;

    resolver 127.0.0.11 ipv6=off valid=10s;
    set $api_upstream http://api:19090;

    root /usr/share/nginx/html;
    index index.html;

    # Keep ACME and similar validation paths reachable.
    location ^~ /.well-known/ {
        try_files $uri =404;
    }

    # Block direct access attempts to hidden files, except /.well-known/.
    location ~ /\.(?!well-known(?:/|$)) {
        return 403;
    }

    # Block common scanner probes for PHP/WordPress surfaces.
    location ~* (^|/)(?:phpinfo(?:\.php)?|xmlrpc(?:\.php)?|wp-[a-z0-9_-]+(?:\.php)?|wp-admin(?:/|$)|wp-content(?:/|$)|wp-includes(?:/|$)|wp-config(?:\.php)?)(?:$|[/?]) {
        return 403;
    }

    # Block access to sensitive file names and backup paths.
    location ~* (^|/)(?:composer\.(?:json|lock)|id_rsa(?:\.pub)?|vendor(?:/|$)|backups?(?:/|$))(?:$|[/?]) {
        return 403;
    }

    location = /api/auth/oauth/google {
        limit_req zone=auth_login burst=10 nodelay;
        limit_conn api_conn 20;

        # Allow both apex and www origins for Google login preflight/response.
        set $cors_origin "";
        if ($http_origin = "https://heyso-diary.com") {
            set $cors_origin "https://heyso-diary.com";
        }
        if ($http_origin = "https://www.heyso-diary.com") {
            set $cors_origin "https://www.heyso-diary.com";
        }

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Vary "Origin" always;
            return 204;
        }

        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Origin "https://heyso-diary.com";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Vary "Origin" always;
    }

    location = /api/auth/reauth/email/send {
        limit_req zone=auth_otp_send burst=5 nodelay;
        limit_conn api_conn 10;

        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location = /api/auth/reauth/email/verify {
        limit_req zone=auth_otp_verify burst=10 nodelay;
        limit_conn api_conn 20;

        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location = /api/admin/auth/login {
        limit_req zone=admin_auth_login burst=8 nodelay;
        limit_conn api_conn 8;

        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location /api/admin/ {
        limit_req zone=admin_api burst=30 nodelay;
        limit_conn api_conn 25;

        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location = /api {
        limit_req zone=api_general burst=40 nodelay;
        limit_conn api_conn 40;

        proxy_pass $api_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location /api/ {
        limit_req zone=api_general burst=40 nodelay;
        limit_conn api_conn 40;

        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location /swagger-ui/ {
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /v3/api-docs {
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
