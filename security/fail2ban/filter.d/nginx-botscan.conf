# Detect high-risk scanner probes against sensitive files and known CMS/PHP targets.
failregex = ^<HOST> - .* "(GET|POST|HEAD|OPTIONS|PROPFIND) /(.*(?:\.env(?:[./][^ ]*)?|\.git(?:/|$)|xmlrpc(?:\.php)?|wp-[a-z0-9_-]+(?:\.php)?|wp-admin(?:/|$)|wp-content(?:/|$)|wp-includes(?:/|$)|wp-config(?:\.php)?|phpinfo(?:\.php)?|composer\.(?:json|lock)|id_rsa(?:\.pub)?|vendor(?:/|$)|backups?(?:/|$)).*) HTTP/[0-9.]+" (401|403|404|405) .*
ignoreregex =
